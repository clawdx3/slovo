version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: slovo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: slovo-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "3000:3000"
    depends_on:
      - redis
    volumes:
      - uploads:/app/.data/uploads

volumes:
  redis-data:
  uploads:
